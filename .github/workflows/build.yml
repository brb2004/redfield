name: Build Redfield

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libgl1-mesa-dev python3-pip libcurl4-openssl-dev
          pip3 install glad --break-system-packages
          python3 -m glad --profile core --api gl=3.3 --generator c --out-path lib/glad

      - name: Build
        run: make

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: redfield-linux
          path: bin/redfield

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-glfw
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            zip
            make

      - name: Generate glad and stdlib
        shell: msys2 {0}
        run: |
          pip install glad
          python -m glad --profile core --api gl=3.3 --generator c --out-path lib/glad
          python -c "import json; content=open('lib/stdlib.rf').read(); print('const char* REDFIELD_STDLIB = ' + json.dumps(content) + ';')" > src/redfield_stdlib.h

      - name: Build
        shell: msys2 {0}
        run: |
          make clean
          make OS=Windows_NT LIBS="-static-libgcc -static-libstdc++ -lglfw3 -lopengl32 -lgdi32 -lcurl -lm -lwinmm -lws2_32 -lcrypt32 -lwldap32"

      - name: Check dependencies
        shell: msys2 {0}
        run: |
          objdump -p bin/redfield.exe | grep "DLL Name"

      - name: Bundle DLLs and zip
        shell: msys2 {0}
        run: |
          objdump -p bin/redfield.exe | grep "DLL Name" | awk '{print $3}' | while read dll; do
            src="/mingw64/bin/$dll"
            if [ -f "$src" ]; then
              echo "Copying $dll"
              cp "$src" bin/
            fi
          done
          zip -j redfield-windows.zip bin/redfield.exe bin/*.dll

      - name: Upload Windows zip
        uses: actions/upload-artifact@v4
        with:
          name: redfield-windows
          path: redfield-windows.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            redfield-linux/redfield
            redfield-windows/redfield-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}